name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Lint skills (frontmatter, name==dir, body length, manifest parity)
        run: node scripts/lint-skills.mjs
